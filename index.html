<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Sistema de Manutenção Ortelan</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet"><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><style>:root {--bg-start: #0a1a12;--bg-end: #030a06;--card-bg: rgba(255, 255, 255, 0.05);--text-main: #e2e8f0;--accent: #34d399;}body {margin: 0; font-family: 'Inter', sans-serif; background: linear-gradient(135deg, var(--bg-start), var(--bg-end)); color: var(--text-main); min-height: 100vh;}.app-screen {display: none; padding: 20px;}.active {display: block;}.card {background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);}.btn {background: var(--accent); color: #000; border: none; padding: 12px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; width: 100%;}.nav-bottom {position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: rgba(0,0,0,0.8); padding: 15px 0; border-top: 1px solid #333;}</style></head><body><div id="tela-home" class="app-screen active"><div class="card"><h1>Ortelan Manutenção</h1><button class="btn" onclick="abrirDashboard()">Dashboard</button></div><button class="btn" onclick="abrirTela('tela-manutencao')">Nova Manutenção</button></div><div id="tela-dashboard" class="app-screen"><div class="card"><h2>Dashboard</h2><canvas id="myChart"></canvas></div><button class="btn" onclick="voltarParaHome()">Voltar</button></div><div id="tela-manutencao" class="app-screen"><div class="card"><h2>Nova Manutenção</h2><input type="text" placeholder="Equipamento"></div><button class="btn" onclick="voltarParaHome()">Salvar</button></div><div id="tela-leituras" class="app-screen"><div class="card"><h2>Leituras</h2></div><button class="btn" onclick="voltarParaHome()">Voltar</button></div><nav class="nav-bottom"><button onclick="voltarParaHome()">Home</button><button onclick="abrirTela('tela-leituras')">Leituras</button></nav><script>const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx-M07XKMRjdaMj7O86XsDamIcRNy-8eRZie-kQjzfpNJ2G7c8B_WrJp4geB5p2mJ7f/exec';function ocultarTodasTelas() {document.querySelectorAll('.app-screen').forEach(s => s.classList.remove('active'));}function abrirTela(id) {ocultarTodasTelas(); document.getElementById(id).classList.add('active');}function abrirDashboard() {abrirTela('tela-dashboard');}function voltarParaHome() {abrirTela('tela-home');}</script></body></html>
