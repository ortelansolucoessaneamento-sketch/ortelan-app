<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <title>Sistema de Manutenção - Ortelan</title>
  <style>
    /* Paleta de Cores baseada na marca ORTELAN - Versão iOS Premium */
    :root {
      --bg-color: #030a06;
      --card-bg: rgba(15, 36, 26, 0.65);
      --primary: #8fb198;
      --primary-hover: #aed1b7;
      --text-main: #e2e8e4;
      --text-muted: #9caf9f;
      --border-color: rgba(143, 177, 152, 0.15);
      --input-bg: rgba(7, 19, 13, 0.7);
    }

    /* Fundo Artístico Estilo iOS */
    body {
      font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      background-image: 
        radial-gradient(circle at 80% 20%, rgba(20, 50, 35, 0.6) 0%, transparent 50%),
        radial-gradient(circle at 15% 75%, rgba(10, 40, 25, 0.7) 0%, transparent 55%),
        radial-gradient(circle at 50% 50%, rgba(7, 19, 13, 1) 0%, rgba(3, 10, 6, 1) 100%);
      background-attachment: fixed;
      color: var(--text-main);
      margin: 0;
      padding: 30px 15px;
      position: relative;
      overflow-x: hidden;
    }

    /* Linhas Artísticas Fluidas e Elegantes de Fundo */
    body::before, body::after {
      content: "";
      position: fixed;
      width: 300vw;
      height: 300vh;
      top: -100vh;
      left: -100vw;
      pointer-events: none;
      z-index: -1;
      opacity: 0.12;
    }

    body::before {
      background: radial-gradient(ellipse at 30% 40%, transparent 60%, var(--primary) 61%, transparent 61.5%);
      transform: rotate(-15deg);
      animation: drift 60s infinite linear;
    }

    body::after {
      background: radial-gradient(ellipse at 70% 60%, transparent 50%, var(--primary) 51%, transparent 51.3%);
      transform: rotate(25deg);
      animation: drift 90s infinite linear reverse;
    }

    @keyframes drift {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Container com Efeito de Vidro Fosco (Glassmorphism) */
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 35px 25px;
      border-radius: 24px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
    }

    .logo-container {
      text-align: center;
      margin-bottom: 35px;
      padding-bottom: 25px;
      border-bottom: 1px solid var(--border-color);
    }
    .logo-container img {
      max-width: 220px;
      height: auto;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
    }

    .sync-alert {
      background: rgba(218, 165, 32, 0.2);
      border: 1px solid rgba(218, 165, 32, 0.4);
      color: #ffe082;
      padding: 12px;
      border-radius: 12px;
      text-align: center;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
    }

    h3 {
      color: #ffffff;
      font-weight: 600;
      font-size: 18px;
      border-left: 4px solid var(--primary);
      padding-left: 12px;
      margin-top: 35px;
      letter-spacing: 0.5px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-weight: 500;
      margin-bottom: 10px;
      color: var(--primary);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    input[type="date"], input[type="number"], select, textarea {
      width: 100%;
      padding: 14px 16px;
      background-color: var(--input-bg);
      color: var(--text-main);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      box-sizing: border-box;
      font-size: 16px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    input[type="date"]:focus, input[type="number"]:focus, select:focus, textarea:focus {
      outline: none;
      border-color: rgba(143, 177, 152, 0.6);
      background-color: rgba(7, 19, 13, 0.9);
      box-shadow: 0 0 0 4px rgba(143, 177, 152, 0.1);
    }

    ::-webkit-calendar-picker-indicator {
      filter: invert(0.8) sepia(0.2) saturate(2) hue-rotate(90deg);
      cursor: pointer;
    }

    textarea {
      resize: vertical;
      min-height: 110px;
    }

    .hidden {
      display: none !important;
    }

    .task-category {
      background-color: rgba(7, 19, 13, 0.4);
      padding: 20px;
      margin-top: 20px;
      border-radius: 16px;
      border: 1px solid var(--border-color);
    }

    .task-category h4 {
      margin: 0 0 18px 0;
      color: #ffffff;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .task-item {
      margin-bottom: 25px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(143, 177, 152, 0.08);
    }
    .task-item:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .task-item strong {
      display: block;
      margin-bottom: 14px;
      color: var(--text-main);
      font-size: 15px;
      font-weight: 500;
      line-height: 1.4;
    }

    .radio-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .radio-option {
      display: flex;
      align-items: center;
      font-size: 15px;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px 0;
      transition: color 0.2s ease;
    }
    .radio-option:hover {
      color: #ffffff;
    }

    .radio-option input {
      margin-right: 14px;
      transform: scale(1.25);
      accent-color: var(--primary);
      cursor: pointer;
    }

    .input-anomalia {
      border-color: rgba(218, 165, 32, 0.4) !important;
      background-color: rgba(218, 165, 32, 0.05) !important;
    }
    .input-anomalia:focus {
      border-color: rgba(218, 165, 32, 0.8) !important;
      box-shadow: 0 0 0 4px rgba(218, 165, 32, 0.1) !important;
    }

    button {
      width: 100%;
      padding: 18px;
      background-color: var(--primary);
      color: #030a06;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      margin-top: 25px;
      box-shadow: 0 4px 15px rgba(143, 177, 152, 0.3);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    button:hover {
      background-color: var(--primary-hover);
      box-shadow: 0 6px 20px rgba(143, 177, 152, 0.5);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(1px);
    }

    button:disabled {
      background-color: rgba(143, 177, 152, 0.2);
      color: var(--text-muted);
      box-shadow: none;
      cursor: not-allowed;
      transform: none;
    }

    #msgSucesso {
      color: #aed1b7;
      font-weight: 500;
      text-align: center;
      margin-top: 20px;
      font-size: 16px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }

    .task-item-pendente {
      border: 1px solid rgba(255, 77, 77, 0.5) !important;
      border-radius: 14px;
      padding: 15px;
      background-color: rgba(255, 77, 77, 0.04);
      box-shadow: 0 0 15px rgba(255, 77, 77, 0.1);
      animation: piscarAlerta 0.8s alternate 2;
    }

    @keyframes piscarAlerta {
      from { border-color: rgba(255, 77, 77, 0.5); }
      to { border-color: rgba(255, 77, 77, 0.1); }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="logo-container">
    <img src="https://drive.google.com/thumbnail?id=1Po1w079UQl5rFoKYa94MIdRP7f4RMPFK&sz=w800" alt="Ortelan Logo">
  </div>

  <div id="avisoOffline" class="sync-alert"></div>
  
  <div class="form-group">
    <label for="data">Data da Manutenção</label>
    <input type="date" id="data" required>
  </div>

  <div class="form-group">
    <label for="local">Local da Instalação</label>
    <select id="local" onchange="atualizarEquipamentos()">
      <option value="">Selecione o local...</option>
    </select>
  </div>

  <div class="form-group hidden" id="grupoEquipamento">
    <label for="equipamento">Equipamento / Estrutura</label>
    <select id="equipamento" onchange="atualizarTipoManutencao()">
      <option value="">Selecione o equipamento...</option>
    </select>
  </div>

  <div class="form-group hidden" id="grupoTipo">
    <label for="tipo">Natureza da Manutenção</label>
    <select id="tipo" onchange="renderizarTarefas()">
      <option value="">Selecione o tipo...</option>
      <option value="Preventiva">Preventiva</option>
      <option value="Corretiva">Corretiva</option>
    </select>
  </div>

  <div id="containerPreventiva" class="hidden">
    <h3>Checklist Preventivo</h3>
    <div id="listaTarefas"></div>
  </div>

  <div id="containerCorretiva" class="form-group hidden">
    <h3>Relatório Corretivo</h3>
    <label for="textoCorretiva">Descrição da Execução</label>
    <textarea id="textoCorretiva" placeholder="Descreva os serviços corretivos executados, peças trocadas, etc..."></textarea>
  </div>

  <div class="form-group hidden" id="grupoAcaoFormulario">
    <button onclick="enviarFormulario()" id="btnSalvar">Salvar Relatório</button>
    <div id="msgSucesso"></div>
  </div>
</div>

<script>
  // Inicialização do Service Worker para cache estrutural off-line
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js')
      .then(() => console.log("Service Worker ativo para modo Off-line estrutural!"))
      .catch((err) => console.log("Falha no registro off-line: ", err));
  }

  const tGerais = { "Geral": ["Verificar aspectos gerais."] };
  const tFunc = { "Geral": ["Verificar funcionamento.", "Verificar aspectos gerais."] };
  const tMacro = { "Geral": ["Aferir leitura", "Verificar funcionamento.", "Verificar aspectos gerais."] };
  const tDosadora = { "Geral": ["Verificar funcionamento.", "Verificar aspectos gerais.", "Verificar dosagem."] };
  
  const tMotobomba = {
    "Inspeções gerais": ["Verificar vazamentos em conexões, selos mecânicos e tubulações.","Observar ruídos anormais e vibrações excessivas.","Conferir temperatura do motor e mancais.","Avaliar a pressão e a vazão da bomba."],
    "Limpeza": ["Limpar filtros, peneiras e válvulas.","Remover sujeira acumulada na carcaça e nas entradas de água.","Em bombas submersas, verificar incrustações e resíduos."],
    "Lubrificação": ["Lubrificar rolamentos e mancais conforme recomendação do fabricante.","Verificar nível e condição do óleo, quando aplicável."],
    "Verificação elétrica": ["Inspecionar cabos, conexões e bornes elétricos.","Medir corrente elétrica e tensão do motor.","Testar funcionamento de disjuntores, relés e proteção térmica.","Verificar aterramento."],
    "Componentes mecânicos": ["Conferir alinhamento entre motor e bomba.","Verificar desgaste de rotor, eixo e acoplamentos.","Inspecionar selo mecânico e gaxetas.","Ajustar parafusos e fixações."],
    "Sistema hidráulico": ["Verificar obstruções na tubulação.","Conferir válvulas de retenção e registros.","Avaliar ocorrência de cavitação."],
    "Testes operacionais": ["Realizar partidas periódicas em bombas reserva.","Monitorar tempo de acionamento e ciclos de operação.","Registrar dados de desempenho para comparação histórica."],
    "Manutenção periódica programada": ["Troca de rolamentos conforme vida útil.","Substituição de selos mecânicos desgastados.","Revisão completa do motor elétrico.","Reaperto estrutural e calibração de instrumentos."]
  };

  const padraoGleba = { "VRP": tFunc, "Descarga": tFunc, "Ventosa": tFunc, "Macromedidor": tMacro };
  const padraoPoco = { "Bomba dosadora": tDosadora, "Estrutura hidráulica": tGerais, "Estrutura elétrica": tGerais, "Estrutura civil": tGerais };

  const baseDados = {
    "LOC 01 - Casa de bomba de recalque": { "Conjunto Motobomba 01": tMotobomba, "Conjunto Motobomba 02": tMotobomba, "Fluxostato": tFunc, "Pressostato": tFunc, "Válvula de alívio": tFunc, "Manômetro do barrilete": tFunc, "Estrutura hidráulica": tGerais, "Estrutura civil": tGerais, "Estrutura elétrica": tGerais },
    "LOC 02 - Reservatório principal Eucalipto": { "Boia controladora de nível": tFunc, "Válvulas gavetas": tFunc, "Estrutura hidráulica": tGerais, "Estrutura civil": tGerais, "Estrutura elétrica": tGerais },
    "LOC 03 - Caixa de quebra pressão": { "Boia de nível": tFunc, "Válvula de nível": tFunc, "Dispositivo volumétrico": tFunc, "Manômetro de automação": tFunc, "Estrutura hidráulica": tGerais, "Estrutura civil": tGerais, "Estrutura elétrica": tGerais },
    "LOC 04 - Gleba 02": padraoGleba, "LOC 05 - Gleba 04": padraoGleba, "LOC 06 - Gleba 06": padraoGleba, "LOC 07 - Gleba 09": padraoGleba,
    "LOC 08 - Poço 01": padraoPoco, "LOC 09 - Poço 02": padraoPoco, "LOC 10 - Poço 03": padraoPoco, "LOC 11 - Poço 04": padraoPoco, "LOC 12 - Poço 05": padraoPoco
  };

  const opcoesResposta = [
    "Executado: Resultado OK ✅", "Executado: Resultado alerta ⚠️", "Executado: Resultado falha ❌",
    "Não executado: Desativado ou fora de operação", "Não executado: Não se aplica"
  ];

  window.onload = function() {
    const selLocal = document.getElementById("local");
    for (const local in baseDados) {
      selLocal.options.add(new Option(local, local));
    }
    verificarFilaOffline();
    window.addEventListener('online', verificarFilaOffline);
  };

  function atualizarEquipamentos() {
    const local = document.getElementById("local").value;
    const selEquip = document.getElementById("equipamento");
    selEquip.innerHTML = '<option value="">Selecione o equipamento...</option>';
    document.getElementById("grupoTipo").classList.add("hidden");
    document.getElementById("containerPreventiva").classList.add("hidden");
    document.getElementById("containerCorretiva").classList.add("hidden");
    document.getElementById("grupoAcaoFormulario").classList.add("hidden");
    document.getElementById("tipo").value = "";

    if (local) {
      document.getElementById("grupoEquipamento").classList.remove("hidden");
      for (const equip in baseDados[local]) {
        selEquip.options.add(new Option(equip, equip));
      }
    } else {
      document.getElementById("grupoEquipamento").classList.add("hidden");
    }
  }

  function atualizarTipoManutencao() {
    const equip = document.getElementById("equipamento").value;
    if (equip) {
      document.getElementById("grupoTipo").classList.remove("hidden");
    } else {
      document.getElementById("grupoTipo").classList.add("hidden");
    }
    document.getElementById("tipo").value = "";
    document.getElementById("containerPreventiva").classList.add("hidden");
    document.getElementById("containerCorretiva").classList.add("hidden");
    document.getElementById("grupoAcaoFormulario").classList.add("hidden");
  }

  function tratarMudancaResposta(index, valorRadio) {
    const inputLeitura = document.getElementById(`leitura_${index}`);
    if (inputLeitura) {
      if (valorRadio.includes("Executado")) {
        inputLeitura.classList.remove("hidden");
        inputLeitura.required = true;
      } else {
        inputLeitura.classList.add("hidden");
        inputLeitura.required = false;
        inputLeitura.value = ""; 
      }
    }

    const inputObsTarefa = document.getElementById(`obs_tarefa_${index}`);
    if (inputObsTarefa) {
      if (valorRadio.includes("alerta ⚠️") || valorRadio.includes("falha ❌")) {
        inputObsTarefa.classList.remove("hidden");
        inputObsTarefa.required = true;
      } else {
        inputObsTarefa.classList.add("hidden");
        inputObsTarefa.required = false;
        inputObsTarefa.value = "";
      }
    }
  }

  function renderizarTarefas() {
    const tipo = document.getElementById("tipo").value;
    const local = document.getElementById("local").value;
    const equip = document.getElementById("equipamento").value;
    
    const contPreventiva = document.getElementById("containerPreventiva");
    const contCorretiva = document.getElementById("containerCorretiva");
    const grupoAcao = document.getElementById("grupoAcaoFormulario");
    const divTarefas = document.getElementById("listaTarefas");
    
    divTarefas.innerHTML = "";
    
    if (tipo === "Preventiva") {
      contPreventiva.classList.remove("hidden");
      contCorretiva.classList.add("hidden");
      grupoAcao.classList.remove("hidden");
      
      const tarefasMap = baseDados[local][equip];
      let tIndex = 0;

      for (const [categoria, tarefas] of Object.entries(tarefasMap)) {
        let htmlCat = `<div class="task-category">`;
        if (categoria !== "Geral") htmlCat += `<h4>${categoria}</h4>`;
        
        tarefas.forEach(tarefa => {
          const exigeLeitura = tarefa.includes("Aferir leitura");
          htmlCat += `<div class="task-item"><strong>${tarefa}</strong><div class="radio-group">`;
          
          opcoesResposta.forEach((op) => {
            htmlCat += `
              <label class="radio-option">
                <input type="radio" name="tarefa_${tIndex}" value="${op}" onchange="tratarMudancaResposta(${tIndex}, this.value)" required>
                ${op}
              </label>`;
          });
          
          htmlCat += `</div>`;

          if (exigeLeitura) {
            htmlCat += `<input type="number" step="0.01" id="leitura_${tIndex}" class="hidden" placeholder="Digite a leitura verificada (ex: 1250.50)" style="margin-top: 15px;">`;
          }

          htmlCat += `<textarea id="obs_tarefa_${tIndex}" class="hidden input-anomalia" placeholder="Descreva detalhadamente a anomalia observada..." style="margin-top: 15px; min-height: 80px;"></textarea></div>`;
          tIndex++;
        });
        htmlCat += `</div>`;
        divTarefas.innerHTML += htmlCat;
      }
    } else if (tipo === "Corretiva") {
      contPreventiva.classList.add("hidden");
      contCorretiva.classList.remove("hidden");
      grupoAcao.classList.remove("hidden");
    } else {
      contPreventiva.classList.add("hidden");
      contCorretiva.classList.add("hidden");
      grupoAcao.classList.add("hidden");
    }
  }

  function enviarFormulario() {
    const data = document.getElementById("data").value;
    const local = document.getElementById("local").value;
    const equip = document.getElementById("equipamento").value;
    const tipo = document.getElementById("tipo").value;
    
    if (!data || !local || !equip || !tipo) {
      alert("Por favor, preencha todos os campos obrigatórios acima.");
      return;
    }

    const payload = { dataManutencao: data, local: local, equipamento: equip, tipo: tipo, observacoes: "", tarefas: {}, corretivaTexto: "" };
    document.querySelectorAll('.task-item').forEach(el => el.classList.remove('task-item-pendente'));

    if (tipo === "Preventiva") {
      const tarefasMap = baseDados[local][equip];
      let tIndex = 0;
      let primeiraTarefaPendente = null;
      let mensagemErroCustomizada = "";

      for (const [categoria, tarefas] of Object.entries(tarefasMap)) {
        for (const tarefa of tarefas) {
          const selecionado = document.querySelector(`input[name="tarefa_${tIndex}"]:checked`);
          const elementoTaskItem = document.querySelectorAll('.task-item')[tIndex];

          if (selecionado) {
            let valorResposta = selecionado.value;
            const campoLeitura = document.getElementById(`leitura_${tIndex}`);
            if (campoLeitura && !campoLeitura.classList.contains("hidden")) {
              if (!campoLeitura.value) {
                if (!primeiraTarefaPendente) {
                  primeiraTarefaPendente = elementoTaskItem;
                  mensagemErroCustomizada = `Por favor, preencha o valor da leitura para a tarefa:\n\n"${tarefa}"`;
                }
              }
              valorResposta += ` - Leitura: ${campoLeitura.value}`;
            }

            const campoObsTarefa = document.getElementById(`obs_tarefa_${tIndex}`);
            let textoObs = "";
            if (campoObsTarefa && !campoObsTarefa.classList.contains("hidden")) {
              textoObs = campoObsTarefa.value.trim();
              if (!textoObs) {
                if (!primeiraTarefaPendente) {
                  primeiraTarefaPendente = elementoTaskItem;
                  mensagemErroCustomizada = `Como este item foi marcado como Alerta ou Falha, descreva o problema na tarefa:\n\n"${tarefa}"`;
                }
              }
            }

            payload.tarefas[tarefa] = { resposta: valorResposta, observacaoItem: textoObs };
          } else {
            if (!primeiraTarefaPendente) {
              primeiraTarefaPendente = elementoTaskItem;
              mensagemErroCustomizada = `Falta responder a tarefa:\n\n"${tarefa}"`;
            }
          }
          tIndex++;
        }
      }
      
      if (primeiraTarefaPendente) {
        primeiraTarefaPendente.classList.add('task-item-pendente');
        primeiraTarefaPendente.scrollIntoView({ behavior: 'smooth', block: 'center' });
        alert(mensagemErroCustomizada);
        return; 
      }
    } else {
      payload.corretivaTexto = document.getElementById("textoCorretiva").value;
      if(!payload.corretivaTexto) {
        alert("Por favor, descreva a manutenção corretiva.");
        return;
      }
    }

    if (!navigator.onLine) {
      salvarNoEstoqueOffline(payload);
      return;
    }
    executarEnvioParaServidor(payload);
  }

  function executarEnvioParaServidor(payload) {
    document.getElementById("btnSalvar").innerText = "Enviando...";
    document.getElementById("btnSalvar").disabled = true;

    const googleUrl = "https://script.google.com/macros/s/AKfycbx-M07XKMRjdaMj7O86XsDamIcRNy-8eRZie-kQjzfpNJ2G7c8B_WrJp4geB5p2mJ7f/exec";

    fetch(googleUrl, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    })
    .then(() => {
      document.getElementById("msgSucesso").innerText = "Relatório processado e enviado com sucesso para a base!";
      limparFormulario();
      verificarFilaOffline();
    })
    .catch(() => {
      alert("Sinal instável. Movendo relatório para o armazenamento interno seguro.");
      salvarNoEstoqueOffline(payload);
    });
  }

  function salvarNoEstoqueOffline(payload) {
    let fila = JSON.parse(localStorage.getItem("ortelan_manutencao_offline")) || [];
    fila.push(payload);
    localStorage.setItem("ortelan_manutencao_offline", JSON.stringify(fila));
    
    document.getElementById("msgSucesso").style.color = "#ffe082";
    document.getElementById("msgSucesso").innerText = "⚠️ Off-line: Guardado no celular! Será enviado automaticamente ao detectar internet.";
    
    setTimeout(() => {
      limparFormulario();
      verificarFilaOffline();
    }, 4000);
  }

  function verificarFilaOffline() {
    let fila = JSON.parse(localStorage.getItem("ortelan_manutencao_offline")) || [];
    const divAviso = document.getElementById("avisoOffline");
    
    if (fila.length === 0) {
      divAviso.style.display = "none";
      return;
    }
    if (!navigator.onLine) {
      divAviso.style.display = "block";
      divAviso.innerText = `📦 Existem ${fila.length} relatórios salvos guardados aguardando internet...`;
      return;
    }

    divAviso.style.display = "block";
    divAviso.innerText = `⚡ Sincronizando ${fila.length} relatórios pendentes com o servidor...`;
    
    const proximoItem = fila[0];
    const googleUrl = "https://script.google.com/macros/s/AKfycbyMuAEf5VTIXz-7mIAVrqTQoo_Gj_oN8v1KnoMG_jElh6OWJw7ui8abO5lusZrkXWYv/exec";

    fetch(googleUrl, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(proximoItem)
    })
    .then(() => {
      fila.shift();
      localStorage.setItem("ortelan_manutencao_offline", JSON.stringify(fila));
      verificarFilaOffline(); 
    })
    .catch(() => console.log("Tentativa de sincronização falhou por oscilação de rede. Retornando ao modo de espera."));
  }

  function limparFormulario() {
    setTimeout(() => {
      document.getElementById("msgSucesso").innerText = "";
      document.getElementById("msgSucesso").style.color = "#aed1b7";
      document.getElementById("btnSalvar").innerText = "Salvar Relatório";
      document.getElementById("btnSalvar").disabled = false;
      document.getElementById("local").value = "";
      atualizarEquipamentos();
    }, 4000);
  }
</script>
