<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ortelan Soluções em Saneamento - App</title>
  <style>
    :root {
      --bg-color: #03151a;
      --card-bg: #052229;
      --input-bg: #021114;
      --text-color: #e6f1f3;
      --accent-color: #00a8e8;
      --success-color: #4caf50;
      --border-color: #0a3d4a;
      --muted-text: #8fa3a6;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      min-height: 100vh;
      padding: 20px;
    }

    header {
      max-width: 1000px;
      margin: 0 auto 20px auto;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 15px;
    }

    .brand {
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .brand span {
      display: block;
      font-size: 11px;
      font-weight: normal;
      color: var(--muted-text);
      letter-spacing: 2px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: var(--card-bg);
      border-radius: 8px;
      border: 1px solid var(--border-color);
      padding: 25px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }

    /* Etapas / Stepper */
    .stepper {
      display: flex;
      justify-content: space-between;
      margin-bottom: 35px;
      position: relative;
    }

    .stepper::before {
      content: '';
      position: absolute;
      top: 15px;
      left: 0;
      right: 0;
      height: 2px;
      background-color: var(--border-color);
      z-index: 1;
    }

    .step {
      position: relative;
      z-index: 2;
      background: var(--card-bg);
      padding: 0 15px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted-text);
      font-size: 14px;
    }

    .step-number {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--input-bg);
      border: 2px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    .step.active {
      color: var(--text-color);
    }

    .step.active .step-number {
      border-color: var(--success-color);
      background: var(--success-color);
    }

    /* Formulários e Seções */
    .step-section {
      display: none;
    }

    .step-section.active {
      display: block;
    }

    h2 {
      font-size: 18px;
      color: var(--accent-color);
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    label {
      display: block;
      font-size: 13px;
      color: var(--muted-text);
      margin-bottom: 8px;
    }

    input, select, textarea {
      width: 100%;
      background-color: var(--input-bg);
      border: 1px solid var(--border-color);
      color: var(--text-color);
      padding: 12px 15px;
      border-radius: 6px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--accent-color);
    }

    /* Cards do Checklist */
    .checklist-category {
      background: var(--input-bg);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      padding: 15px;
      margin-bottom: 20px;
    }

    .category-title {
      font-size: 15px;
      font-weight: bold;
      color: var(--accent-color);
      margin-bottom: 15px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 5px;
    }

    .task-item {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(10, 61, 74, 0.4);
    }

    .task-item:last-child {
      border-bottom: none;
    }

    .task-text {
      font-size: 14px;
    }

    /* Resumo */
    .summary-card {
      background: var(--input-bg);
      border: 1px solid var(--border-color);
      padding: 20px;
      border-radius: 6px;
      margin-bottom: 25px;
    }

    .summary-item {
      margin-bottom: 12px;
      font-size: 15px;
    }

    .summary-item strong {
      color: var(--muted-text);
      display: inline-block;
      width: 140px;
    }

    /* Botões */
    .btn-container {
      display: flex;
      justify-content: space-between;
      margin-top: 30px;
      gap: 15px;
    }

    .btn {
      padding: 14px 28px;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
      border: none;
      transition: opacity 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .btn-back {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-color);
    }

    .btn-next {
      background: var(--success-color);
      color: white;
      flex-grow: 1;
    }

    @media(max-width: 768px) {
      .form-row {
        grid-template-columns: 1fr;
      }
      .stepper {
        flex-direction: column;
        gap: 10px;
      }
      .stepper::before {
        display: none;
      }
      .step {
        padding: 5px 0;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="brand">ORTELAN<span>SOLUÇÕES EM SANEAMENTO</span></div>
  </header>

  <div class="container">
    <div class="stepper">
      <div class="step active" id="step1-header">
        <div class="step-number">1</div> Dados gerais
      </div>
      <div class="step" id="step2-header">
        <div class="step-number">2</div> Checklist
      </div>
      <div class="step" id="step3-header">
        <div class="step-number">3</div> Finalizar
      </div>
    </div>

    <div class="step-section active" id="section1">
      <h2>Informações Gerais</h2>
      
      <div class="form-group">
        <label for="dataManutencao">Data da manutenção</label>
        <input type="date" id="dataManutencao" value="2026-06-02">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="horaInicio">Hora de início</label>
          <input type="time" id="horaInicio" value="08:00">
        </div>
        <div class="form-group">
          <label for="horaTermino">Hora de término (previsão)</label>
          <input type="time" id="horaTermino" value="10:00">
        </div>
      </div>

      <div class="form-group">
        <label for="localInstalacao">Local da instalação</label>
        <select id="localInstalacao" onchange="atualizarEquipamentos()">
          <option value="">Selecione um local...</option>
        </select>
      </div>

      <div class="form-group">
        <label for="equipamentoEstrutura">Equipamento / Estrutura</label>
        <select id="equipamentoEstrutura">
          <option value="">Selecione o local primeiro...</option>
        </select>
      </div>

      <div class="form-group">
        <label for="naturezaManutencao">Natureza da manutenção</label>
        <select id="naturezaManutencao">
          <option value="Preventiva" selected>Preventiva</option>
          <option value="Corretiva">Corretiva</option>
          <option value="Preditiva">Preditiva</option>
        </select>
      </div>

      <div class="form-group">
        <label for="responsavel">Responsável</label>
        <input type="text" id="responsavel" value="João da Silva">
      </div>

      <h2>Detalhes Adicionais</h2>
      <div class="form-group">
        <label for="observacoes">Observações (opcional)</label>
        <textarea id="observacoes" rows="3" placeholder="Adicione observações caso necessário..."></textarea>
      </div>
    </div>

    <div class="step-section" id="section2">
      <h2>Checklist de Manutenção</h2>
      <div id="containerChecklist">
        </div>
    </div>

    <div class="step-section" id="section3">
      <h2>Resumo Técnico Geral</h2>
      <div class="summary-card">
        <div class="summary-item"><strong>🗓️ Data:</strong> <span id="resData"></span></div>
        <div class="summary-item"><strong>📍 Local:</strong> <span id="resLocal"></span></div>
        <div class="summary-item"><strong>⚙️ Equipamento:</strong> <span id="resEquip"></span></div>
        <div class="summary-item"><strong>🛠️ Natureza:</strong> <span id="resNatureza"></span></div>
      </div>
    </div>

    <div class="btn-container">
      <button class="btn btn-back" id="btnVoltar" onclick="voltarPasso()" style="display: none;">VOLTAR</button>
      <button class="btn btn-next" id="btnAvancar" onclick="avancarPasso()">AVANÇAR</button>
    </div>
  </div>

  <script>
    // --- BANCO DE DADOS TÉCNICO OFICIAL INTEGRADO ---
    const tGerais = { "Geral": ["Verificar aspectos gerais."] };
    const tFunc = { "Geral": ["Verificar funcionamento.", "Verificar aspectos gerais."] };
    const tMacro = { "Geral": ["Aferir leitura", "Verificar funcionamento.", "Verificar aspectos gerais."] };
    const tDosadora = { "Geral": ["Verificar funcionamento.", "Verificar aspectos gerais.", "Verificar dosagem."] };

    const tMotobomba = {
      "Inspeções gerais": [
        "Verificar vazamentos em conexões, selos mecânicos e tubulações.",
        "Observar ruídos anormais e vibrações excessivas.",
        "Conferir temperatura do motor e mancais.",
        "Avaliar a pressão e a vazão da bomba."
      ],
      "Limpeza": [
        "Limpar filtros, peneiras e válvulas.",
        "Remover sujeira acumulada na carcaça e nas entradas de água.",
        "Em bombas submersas, verificar incrustações e resíduos."
      ],
      "Lubrificação": [
        "Lubrificar rolamentos e mancais conforme recomendação do fabricante.",
        "Verificar nível e condição do óleo, quando aplicável."
      ],
      "Verificação elétrica": [
        "Inspecionar cabos, conexões e bornes elétricos.",
        "Medir corrente elétrica e tensão do motor.",
        "Testar funcionamento de disjuntores, relés e proteção térmica.",
        "Verificar aterramento."
      ],
      "Componentes mecânicos": [
        "Conferir alinhamento entre motor e bomba.",
        "Verificar desgaste de rotor, eixo e acoplamentos.",
        "Inspecionar selo mecânico e gaxetas.",
        "Ajustar parafusos e fixações."
      ],
      "Sistema hidráulico": [
        "Verificar obstruções na tubulação.",
        "Conferir válvulas de retenção e registros.",
        "Avaliar ocorrência de cavitação."
      ],
      "Testes operacionais": [
        "Realizar partidas periódicas em bombas reserva.",
        "Monitorar tempo de acionamento e ciclos de operação.",
        "Registrar dados de desempenho para comparação histórica."
      ],
      "Manutenção periódica programada": [
        "Troca de rolamentos conforme vida útil.",
        "Substituição de selos mecânicos desgastados.",
        "Revisão completa do motor elétrico.",
        "Reaperto estrutural e calibração de instrumentos."
      ]
    };

    const padraoGleba = { 
      "VRP": tFunc, 
      "Descarga": tFunc, 
      "Ventosa": tFunc, 
      "Macromedidor": tMacro 
    };

    const padraoPoco = { 
      "Bomba dosadora": tDosadora, 
      "Estrutura hidráulica": tGerais, 
      "Estrutura elétrica": tGerais, 
      "Estrutura civil": tGerais 
    };

    const baseDados = {
      "LOC 01 - Casa de bomba de recalque": { 
        "Conjunto Motobomba 01": tMotobomba, 
        "Conjunto Motobomba 02": tMotobomba, 
        "Fluxostato": tFunc, 
        "Pressostato": tFunc, 
        "Válvula de alívio": tFunc, 
        "Manômetro do barrilete": tFunc, 
        "Estrutura hidráulica": tGerais, 
        "Estrutura civil": tGerais, 
        "Estrutura elétrica": tGerais 
      },
      "LOC 02 - Reservatório principal Eucalipto": { 
        "Boia controladora de nível": tFunc, 
        "Válvulas gavetas": tFunc, 
        "Estrutura hidráulica": tGerais, 
        "Estrutura civil": tGerais, 
        "Estrutura elétrica": tGerais 
      },
      "LOC 03 - Caixa de quebra pressão": { 
        "Boia de nível": tFunc, 
        "Válvula de nível": tFunc, 
        "Dispositivo volumétrico": tFunc, 
        "Manômetro de automação": tFunc, 
        "Estrutura hidráulica": tGerais, 
        "Estrutura civil": tGerais, 
        "Estrutura elétrica": tGerais 
      },
      "LOC 04 - Gleba 02": padraoGleba, 
      "LOC 05 - Gleba 04": padraoGleba, 
      "LOC 06 - Gleba 06": padraoGleba, 
      "LOC 07 - Gleba 09": padraoGleba,
      "LOC 08 - Poço 01": padraoPoco, 
      "LOC 09 - Poço 02": padraoPoco, 
      "LOC 10 - Poço 03": padraoPoco, 
      "LOC 11 - Poço 04": padraoPoco, 
      "LOC 12 - Poço 05": padraoPoco
    };

    const opcoesChecklist = [
      "Executado em conformidade", 
      "Não executado: Desativado ou fora de operação", 
      "Não executado: Não se aplica"
    ];

    // --- CONTROLE DOS PASSOS (ETAPAS) ---
    let passoAtual = 1;

    // Inicialização do APP
    window.onload = function() {
      const selectLocal = document.getElementById("localInstalacao");
      for (let local in baseDados) {
        let opt = document.createElement("option");
        opt.value = local;
        opt.innerText = local;
        selectLocal.appendChild(opt);
      }
    };

    // Atualização Condicional Dinâmica de Equipamentos
    function atualizarEquipamentos() {
      const localSel = document.getElementById("localInstalacao").value;
      const selectEquip = document.getElementById("equipamentoEstrutura");
      selectEquip.innerHTML = '<option value="">Selecione um equipamento...</option>';

      if (localSel && baseDados[localSel]) {
        for (let equip in baseDados[localSel]) {
          let opt = document.createElement("option");
          opt.value = equip;
          opt.innerText = equip;
          selectEquip.appendChild(opt);
        }
      } else {
        selectEquip.innerHTML = '<option value="">Selecione o local primeiro...</option>';
      }
    }

    // Geração Automática das Tarefas do Checklist
    function gerarChecklist() {
      const localSel = document.getElementById("localInstalacao").value;
      const equipSel = document.getElementById("equipamentoEstrutura").value;
      const container = document.getElementById("containerChecklist");
      container.innerHTML = "";

      if (!localSel || !equipSel) return;

      const categorias = baseDados[localSel][equipSel];

      for (let categoria in categorias) {
        let catDiv = document.createElement("div");
        catDiv.className = "checklist-category";
        catDiv.innerHTML = `<div class="category-title">${categoria}</div>`;

        categorias[categoria].forEach((tarefa, index) => {
          let taskDiv = document.createElement("div");
          taskDiv.className = "task-item";
          
          let idSelect = `task_${categoria.replace(/\s+/g, '_')}_${index}`;
          
          taskDiv.innerHTML = `
            <div class="task-text">${tarefa}</div>
            <select id="${idSelect}">
              ${opcoesChecklist.map(opt => `<option value="${opt}">${opt}</option>`).join('')}
            </select>
          `;
          catDiv.appendChild(taskDiv);
        });

        container.appendChild(catDiv);
      }
    }

    // Fluxo do Painel de Navegação
    function alternarSecoes() {
      document.querySelectorAll(".step-section").forEach(sec => sec.classList.remove("active"));
      document.querySelectorAll(".step").forEach(st => st.classList.remove("active"));

      document.getElementById(`section${passoAtual}`).classList.add("active");
      document.getElementById(`step${passoAtual}-header`).classList.add("active");

      // Ajustes visuais de botões
      document.getElementById("btnVoltar").style.display = passoAtual === 1 ? "none" : "block";
      
      const btnAvancar = document.getElementById("btnAvancar");
      if (passoAtual === 3) {
        btnAvancar.innerText = "SALVAR RELATÓRIO";
        btnAvancar.style.backgroundColor = "var(--success-color)";
      } else {
        btnAvancar.innerText = "AVANÇAR";
        btnAvancar.style.backgroundColor = "var(--success-color)";
      }
    }

    function avancarPasso() {
      if (passoAtual === 1) {
        if (!document.getElementById("localInstalacao").value || !document.getElementById("equipamentoEstrutura").value) {
          alert("Por favor, preencha o Local e o Equipamento antes de avançar.");
          return;
        }
        gerarChecklist();
        passoAtual = 2;
        alternarSecoes();
      } else if (passoAtual === 2) {
        // Alimenta tela de resumo final
        document.getElementById("resData").innerText = document.getElementById("dataManutencao").value;
        document.getElementById("resLocal").innerText = document.getElementById("localInstalacao").value;
        document.getElementById("resEquip").innerText = document.getElementById("equipamentoEstrutura").value;
        document.getElementById("resNatureza").innerText = document.getElementById("naturezaManutencao").value;
        
        passoAtual = 3;
        alternarSecoes();
      } else if (passoAtual === 3) {
        alert("Relatório técnico salvo com sucesso e pronto para sincronização!");
      }
    }

    function voltarPasso() {
      if (passoAtual > 1) {
        passoAtual--;
        alternarSecoes();
      }
    }
  </script>
</body>
</html>
