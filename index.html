<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ortelan Soluções em Saneamento</title>
  
  <!-- Fontes e Ícones Modernos -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* ==========================================
       🎨 ESTILOS PREMIUM - GLASSMORPHISM
       ========================================== */
    :root {
      --bg-gradient: linear-gradient(135deg, #06101e 0%, #021f24 50%, #040d1a 100%);
      --glass-bg: rgba(10, 25, 41, 0.7);
      --glass-border: rgba(255, 255, 255, 0.06);
      --text-main: #ffffff;
      --text-muted: #7e8b9b;
      --neon-green: linear-gradient(90deg, #5ba962 0%, #3f7d45 100%);
      --accent-blue: #00d2ff;
      --input-bg: rgba(2, 12, 22, 0.6);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: var(--bg-gradient);
      background-attachment: fixed;
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding-bottom: 90px; /* Espaço para o menu inferior */
    }

    /* Topo do App */
    .app-header {
      padding: 24px 20px 10px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .back-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      color: var(--text-main);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      cursor: pointer;
    }

    .header-titles h1 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    .header-titles p {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* Barra de Progresso Passos (Stepper) */
    .stepper {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 25px;
      margin-bottom: 10px;
      position: relative;
    }

    .step-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
      z-index: 2;
    }

    .step-item.active {
      color: var(--text-main);
    }

    .step-number {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
    }

    .step-item.active .step-number {
      background: #5ba962;
      color: white;
      box-shadow: 0 0 10px rgba(91, 169, 98, 0.4);
    }

    .step-line {
      flex-grow: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.1);
      margin: 0 12px;
    }

    /* Container de Cartões (Formulário) */
    .content-container {
      padding: 0 16px;
    }

    .glass-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    .card-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--accent-blue);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 18px;
    }

    /* Grupos de Inputs Estilizados */
    .input-group {
      margin-bottom: 20px;
      position: relative;
    }

    .input-group:last-child {
      margin-bottom: 0;
    }

    .input-label {
      display: block;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 8px;
      font-weight: 500;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      color: var(--text-muted);
      font-size: 15px;
      pointer-events: none;
    }

    .form-control {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 14px 14px 14px 42px;
      color: var(--text-main);
      font-size: 15px;
      outline: none;
      transition: all 0.3s ease;
      appearance: none; /* Remove seta padrão em iOS */
      -webkit-appearance: none;
    }

    .form-control:focus {
      border-color: rgba(0, 210, 255, 0.4);
      background: rgba(2, 12, 22, 0.8);
    }

    /* Ajuste para ícone de seta em selects */
    select.form-control {
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%237e8b9b' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
      background-repeat: no-repeat;
      background-position: right 14px center;
      background-size: 16px;
    }

    /* Linhas duplas de inputs (Hora de início / Término) */
    .input-row {
      display: flex;
      gap: 12px;
    }

    .input-row .input-group {
      flex: 1;
    }

    /* Textarea Customizado */
    textarea.form-control {
      padding: 14px;
      resize: none;
      height: 100px;
    }

    .char-count {
      text-align: right;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 5px;
    }

    /* Botão Principal */
    .btn-next {
      width: 100%;
      background: var(--neon-green);
      border: none;
      border-radius: 25px;
      padding: 16px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(91, 169, 98, 0.3);
      transition: opacity 0.2s;
      margin-top: 10px;
    }

    .btn-next:active {
      opacity: 0.8;
    }

    /* Menu de Navegação Inferior */
    .nav-bottom {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 75px;
      background: rgba(6, 15, 28, 0.9);
      border-top: 1px solid var(--glass-border);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 0 10px;
      z-index: 999;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 11px;
      font-weight: 500;
      gap: 5px;
    }

    .nav-item.active {
      color: #5ba962;
    }

    .nav-item i {
      font-size: 20px;
    }

    /* Botão central de bola (+) */
    .nav-item-center {
      position: relative;
      top: -15px;
    }

    .center-circle {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: #5ba962;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 22px;
      box-shadow: 0 4px 15px rgba(91, 169, 98, 0.4);
    }
  </style>
</head>
<body>

  <!-- Topo com Botão Voltar -->
  <header class="app-header">
    <button class="back-btn"><i class="fa-solid fa-arrow-left"></i></button>
    <div class="header-titles">
      <h1>Nova manutenção</h1>
      <p>Preencha os dados da manutenção</p>
    </div>
  </header>

  <!-- Barra de Passos -->
  <section class="stepper">
    <div class="step-item active">
      <div class="step-number">1</div>
      <span>Dados gerais</span>
    </div>
    <div class="step-line"></div>
    <div class="step-item">
      <div class="step-number">2</div>
      <span>Checklist</span>
    </div>
    <div class="step-line"></div>
    <div class="step-item">
      <div class="step-number">3</div>
      <span>Finalizar</span>
    </div>
  </section>

  <!-- Container de Formulários -->
  <main class="content-container">
    
    <!-- Bloco 1: Informações Gerais -->
    <div class="glass-card">
      <div class="card-title">Informações Gerais</div>
      
      <!-- Data -->
      <div class="input-group">
        <label class="input-label">Data da manutenção</label>
        <div class="input-wrapper">
          <i class="fa-regular fa-calendar input-icon"></i>
          <input type="date" class="form-control" id="dataManutencao" value="2026-06-01">
        </div>
      </div>

      <!-- Horas em Linha Dupla -->
      <div class="input-row">
        <div class="input-group">
          <label class="input-label">Hora de início</label>
          <div class="input-wrapper">
            <i class="fa-regular fa-clock input-icon"></i>
            <select class="form-control" id="horaInicio">
              <option value="08:00">08:00</option>
              <option value="09:00">09:00</option>
            </select>
          </div>
        </div>
        <div class="input-group">
          <label class="input-label">Hora de término (previsão)</label>
          <div class="input-wrapper">
            <i class="fa-regular fa-clock input-icon"></i>
            <select class="form-control" id="horaFim">
              <option value="10:00">10:00</option>
              <option value="11:00">11:00</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Local da Instalação -->
      <div class="input-group">
        <label class="input-label">Local da instalação</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-location-dot input-icon"></i>
          <select class="form-control" id="local">
            <option>LOC 02 - Reservatório principal Eucalip</option>
            <option>LOC 04 - Gleba 02</option>
            <option>LOC 05 - Gleba 04</option>
            <option>LOC 06 - Gleba 06</option>
          </select>
        </div>
      </div>

      <!-- Equipamento -->
      <div class="input-group">
        <label class="input-label">Equipamento / Estrutura</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-cube input-icon"></i>
          <select class="form-control" id="equipamento">
            <option>Boia controladora de nível</option>
            <option>Macromedidor</option>
          </select>
        </div>
      </div>

      <!-- Natureza da Manutenção -->
      <div class="input-group">
        <label class="input-label">Natureza da manutenção</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-wrench input-icon"></i>
          <select class="form-control" id="tipo">
            <option value="Preventiva">Preventiva</option>
            <option value="Corretiva">Corretiva</option>
          </select>
        </div>
      </div>

      <!-- Responsável -->
      <div class="input-group">
        <label class="input-label">Responsável</label>
        <div class="input-wrapper">
          <i class="fa-regular fa-user input-icon"></i>
          <select class="form-control" id="responsavel">
            <option>João da Silva</option>
          </select>
        </div>
      </div>

    </div>

    <!-- Bloco 2: Detalhes Adicionais -->
    <div class="glass-card">
      <div class="card-title">Detalhes Adicionais</div>
      <div class="input-group">
        <label class="input-label">Observações (opcional)</label>
        <textarea class="form-control" placeholder="Adicione observações..." maxlength="300"></textarea>
        <div class="char-count">0/300</div>
      </div>
    </div>

    <!-- Botão Próximo -->
    <button class="btn-next">
      Próximo <i class="fa-solid fa-arrow-right"></i>
    </button>

  </main>

  <!-- Menu de Navegação Inferior -->
  <nav class="nav-bottom">
    <a href="#" class="nav-item">
      <i class="fa-solid fa-house"></i>
      <span>Início</span>
    </a>
    <a href="#" class="nav-item">
      <i class="fa-solid fa-location-dot"></i>
      <span>Locais</span>
    </a>
    <a href="#" class="nav-item nav-item-center">
      <div class="center-circle"><i class="fa-solid fa-plus"></i></div>
    </a>
    <a href="#" class="nav-item active">
      <div class="nav-icon-wrapper"><i class="fa-regular fa-clipboard"></i></div>
      <span>Checklist</span>
    </a>
    <a href="#" class="nav-item">
      <i class="fa-solid fa-ellipsis"></i>
      <span>Mais</span>
    </a>
  </nav>

</body>
</html>
