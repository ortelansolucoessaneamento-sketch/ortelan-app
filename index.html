<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Sistema de Manutenção Ortelan</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><style>:root{--bg-dark:#030d08;--bg-card:rgba(255,255,255,0.05);--primary:#34d399;--text:#e2e8f0;}body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#030d08,#071f13);color:var(--text);margin:0;padding:20px;min-height:100vh}.app-screen{display:none;max-width:600px;margin:0 auto}.app-screen.active{display:block}.card{background:var(--bg-card);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);padding:20px;border-radius:16px;margin-bottom:20px}.btn{background:var(--primary);color:#000;border:none;padding:12px 20px;border-radius:8px;cursor:pointer;font-weight:600;width:100%;margin-top:10px}h1,h2{margin-top:0}.status-bar{font-size:0.8rem;text-align:center;margin-bottom:10px;color:var(--primary)}</style></head><body><div id="sync-alert" class="status-bar"></div><div id="home" class="app-screen active"><div class="card"><h1>Ortelan Manutenção</h1><button class="btn" onclick="abrirTelaManutencao()">Nova Manutenção</button><button class="btn" onclick="abrirDashboard()">Dashboard</button></div></div><div id="dashboard" class="app-screen"><div class="card"><h2>Dashboard</h2><canvas id="myChart"></canvas><button class="btn" onclick="voltarParaHome()">Voltar</button></div></div><div id="manutencao" class="app-screen"><div class="card"><h2 id="titulo-manutencao">Checklist</h2><div id="checklist-container"></div><button class="btn" onclick="finalizarManutencao()">Finalizar</button><button class="btn" style="background:transparent;color:white" onclick="voltarParaHome()">Cancelar</button></div></div><script>const baseDados={Locais:[{id:1,nome:"Setor A",Equipamentos:[{id:101,nome:"Compressor 01",tarefas:["Verificar óleo","Limpar filtro"]}]}]};function abrirTelaManutencao(){document.querySelectorAll('.app-screen').forEach(s=>s.classList.remove('active'));document.getElementById('manutencao').classList.add('active');renderChecklist();}function abrirDashboard(){document.querySelectorAll('.app-screen').forEach(s=>s.classList.remove('active'));document.getElementById('dashboard').classList.add('active');renderChart();}function voltarParaHome(){document.querySelectorAll('.app-screen').forEach(s=>s.classList.remove('active'));document.getElementById('home').classList.add('active');}function renderChecklist(){const container=document.getElementById('checklist-container');container.innerHTML=baseDados.Locais[0].Equipamentos[0].tarefas.map(t=>`<div style="margin-bottom:10px"><label>${t}</label><input type="checkbox" style="margin-left:10px"></div>`).join('');}function renderChart(){const ctx=document.getElementById('myChart').getContext('2d');new Chart(ctx,{type:'line',data:{labels:['Jan','Fev','Mar'],datasets:[{label:'Manutenções',data:[12,19,3],borderColor:'#34d399'}]}});}function finalizarManutencao(){localStorage.setItem('pendente',JSON.stringify({data:new Date()}));document.getElementById('sync-alert').innerText="Sincronização pendente!";voltarParaHome();}if(localStorage.getItem('pendente'))document.getElementById('sync-alert').innerText="Sincronização pendente!";</script></body></html>
