<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Sistema de Manutenção Ortelan</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><style>:root{--primary:#00ff9d;--bg:#030d08;--card:rgba(10, 28, 19, 0.45);}body{margin:0;font-family:'Segoe UI',sans-serif;background:radial-gradient(circle at center,#071f13,#030d08,#020a05);color:#fff;min-height:100vh;display:flex;flex-direction:column}header{padding:20px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,0.2);backdrop-filter:blur(10px)}header h1{font-size:1.2rem;margin:0;color:var(--primary)}.app-screen{display:none;padding:20px}.active{display:block}.card{background:var(--card);backdrop-filter:blur(15px);border:1px solid rgba(255,255,255,0.1);padding:20px;border-radius:15px;margin-bottom:20px}.btn{background:var(--primary);color:#000;padding:12px 20px;border:none;border-radius:8px;cursor:pointer;font-weight:bold;width:100%}.nav-bar{position:fixed;bottom:0;width:100%;display:flex;justify-content:space-around;padding:15px;background:rgba(0,0,0,0.8);backdrop-filter:blur(10px)}</style></head><body><header><h1>ORTELAN SOLUÇÕES</h1><div class="user-profile"><i class="fa fa-user"></i> Silvio</div></header><div id="home" class="app-screen active"><div class="card"><h3>Dashboard</h3><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><div class="card">Enviadas: <span id="count-enviadas">0</span></div><div class="card">Offline: <span id="count-offline">0</span></div></div><button class="btn" onclick="mostrarTela('selecao')">Nova Manutenção</button></div></div><div id="selecao" class="app-screen"><div class="card"><h3>Seleção</h3><select id="local" class="btn" style="background:#fff;margin-bottom:10px"></select><select id="equip" class="btn" style="background:#fff"></select><button class="btn" style="margin-top:20px" onclick="mostrarTela('checklist')">Iniciar</button></div></div><div id="checklist" class="app-screen"><div class="card" id="checklist-container"><h3>Checklist</h3><div id="tarefas"></div><button class="btn" onclick="salvarManutencao()">Finalizar</button></div></div><nav class="nav-bar"><i class="fa fa-home" onclick="mostrarTela('home')"></i><i class="fa fa-chart-line" onclick="mostrarTela('graficos')"></i></nav><script>const baseDados = { "ETA": { "Bomba 1": ["Limpeza", "Lubrificação"], "Filtro": ["Retrolavagem"] } };function mostrarTela(id){document.querySelectorAll('.app-screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}function salvarManutencao(){const data = {status: 'offline', timestamp: new Date().toISOString()};let storage = JSON.parse(localStorage.getItem('manutencoes')||'[]');storage.push(data);localStorage.setItem('manutencoes', JSON.stringify(storage));alert('Dados salvos localmente!');fetch('https://script.google.com/macros/s/AKfycbx-M07XKMRjdaMj7O86XsDamIcRNy-8eRZie-kQjzfpNJ2G7c8B_WrJp4geB5p2mJ7f/exec',{method:'POST',body:JSON.stringify(data)}).then(()=>alert('Sincronizado com sucesso!')).catch(()=>alert('Erro ao sincronizar, tente mais tarde.'));mostrarTela('home')}window.onload=()=>{const selectLocal = document.getElementById('local');Object.keys(baseDados).forEach(l=>{let opt=document.createElement('option');opt.value=l;opt.innerHTML=l;selectLocal.appendChild(opt)})}</script></body></html>
